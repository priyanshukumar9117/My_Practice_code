<!DOCTYPE html>
<html>
<head>
<title>AI Krishi Assistant</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #a8e063, #56ab2f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 400px;
    box-shadow: 0px 0px 10px gray;
}
textarea {
    width: 100%;
    padding: 10px;
}
button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    font-size: 16px;
}
h2 { text-align: center; }
</style>
</head>
<body>
<div class="box">
<h2>🌾 AI Krishi Assistant</h2>
<form method="post">
<textarea name="query" placeholder="किसान अपना प्रश्न यहाँ लिखें"></textarea><br><br>
<button type="submit">Ask</button>
</form>
<h3>उत्तर:</h3>
<p>{{ answer }}</p>
</div>
</body>
</html>
