{% extends 'base.html' %}
{% block title %} Contact {% endblock title %}

{% block body %} 
<div class="container-fluid px-0">
    <img src="https://i.pinimg.com/originals/fd/4f/62/fd4f62661bab7cbc06ac47c5fa4aa8d0.jpg" class="d-block w-100 my-4" alt="...">
</div>   

<div  class="container">
    <h1 class="text-center">Contact Us</h1>
    <form method="POST" action="/contact">
        {% csrf_token %}
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="phone" class="form-control" id="phone" name="phone" placeholder="Enter your phone number">
        </div>


        <div class="form-group">
          <label for="desc">Tell me about What you want to contact me for...</label>
          <textarea class="form-control" id="desc" rows="3" name="desc"></textarea>
        </div>
        <button type="submit" class="btn btn-primary my-3">Submit</button>
        </form>
{% endblock body %}
